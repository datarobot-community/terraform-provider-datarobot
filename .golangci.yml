version: "2"
linters:
  default: none
  enable:
    - copyloopvar
    - dupl
    - durationcheck
    - errcheck
    - forcetypeassert
    - gocognit
    - gocyclo
    - godot
    - gosec
    - govet
    - ineffassign
    - lll
    - makezero
    - misspell
    - nilerr
    - predeclared
    - revive
    - staticcheck
    - unconvert
    - unparam
    - unused
  settings:
    dupl:
      threshold: 400
    gocyclo:
      min-complexity: 40
    gocognit:
      min-complexity: 70
    godox:
      keywords:
        - TODO
        - FIXME
        - HACK
        - BUG
    lll:
      line-length: 400
    gosec:
      excludes:
        - G104  # Errors unhandled — already caught by errcheck
    revive:
      rules:
        - name: package-comments
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    paths:
      - third_party$
      - builtin$
      - examples$
    rules:
      - linters:
          - dupl
          - gocognit
          - gocyclo
        path: _test\.go$
      - linters:
          - dupl
        path: _credential_resource\.go$
      # User MCP * metadata resources share structure (Create, Configure, helpers); dupl flags them.
      - linters:
          - dupl
        path: user_mcp_.*_metadata_resource\.go$
      - linters:
          - gosec
        path: _test\.go$
      # credentials_model_service.go contains only credential *type name* constants
      # (e.g. "snowflake_oauth_user_account"), not actual credentials.
      - linters:
          - gosec
        path: internal/client/credentials_model_service\.go$
        text: "G101"
      # EnvironmentVariableSourceCredential = "dr-credential" is a source-type label, not a credential.
      - linters:
          - gosec
        path: internal/client/workloads_service\.go$
        text: "G101"
      # DataRobotApiKeyEnvVar = "DATAROBOT_API_TOKEN" is the *name* of an env var, not its value.
      - linters:
          - gosec
        path: pkg/provider/models\.go$
        text: "G101"
issues:
  max-same-issues: 0
formatters:
  enable:
    - gofmt
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$

